      { code:"904",name:"ปัตตานี",       reg:319,  wait:6,   eligible:207,  approved:204,  inRound:204,  amtIn:689220,   paid:579800,   pending:109420,  units:3,   pct:84.1,score:5.14, group:"E",rank:34},
      { code:"905",name:"ยะลา",          reg:449,  wait:0,   eligible:191,  approved:191,  inRound:186,  amtIn:1073057,  paid:928200,   pending:144857,  units:5,   pct:86.5,score:4.66, group:"E",rank:37},
      { code:"906",name:"นราธิวาส",      reg:237,  wait:11,  eligible:129,  approved:126,  inRound:126,  amtIn:542273,   paid:505343,   pending:36930,   units:3,   pct:93.2,score:2.45, group:"E",rank:45},
    ];

    /* ═══════════════════════════════════════════════════════════
       UTILITIES
    ═══════════════════════════════════════════════════════════ */
    const fmtM = (n) =>
      n >= 1e6 ? `${(n / 1e6).toFixed(1)} ลบ.` : n >= 1e3 ? `${Math.round(n / 1e3)}k` : String(Math.round(n));
    const fmtN = (n) => Math.round(n).toLocaleString("th-TH");

    /* ═══════════════════════════════════════════════════════════
       COMPONENTS
    ═══════════════════════════════════════════════════════════ */
    const GroupBadge = ({ g }) => {
      const c = GRP[g];
      return (
        <span
          style={{
            background: c.bg, color: c.color, border: `1px solid ${c.border}`,
            fontSize: 10, padding: "1px 7px", borderRadius: 999, fontWeight: 700,
            whiteSpace: "nowrap", display: "inline-block",
          }}
        >
          {g} · {c.short}
        </span>
      );
    };

    const KPICard = ({ title, value, sub, color, icon: Icon }) => (
      <div
        style={{
          background: "white", borderRadius: 16, padding: "18px 20px",
          boxShadow: "0 1px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)",
          border: "1px solid #f1f5f9", display: "flex", flexDirection: "column", gap: 10,
        }}
      >
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 12, color: "#64748b", fontWeight: 500 }}>{title}</span>
          <div
            style={{
              width: 34, height: 34, borderRadius: 10,
              background: `${color}18`, display: "flex", alignItems: "center", justifyContent: "center",
            }}
          >
            <Icon size={16} style={{ color }} />
          </div>
        </div>
        <div style={{ fontSize: 20, fontWeight: 700, color: "#0f172a", letterSpacing: "-0.5px" }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: "#94a3b8" }}>{sub}</div>}
      </div>
    );

    const FunnelViz = () => {
      const max = FUNNEL[0].value;
      const colors = [PRIMARY, "#0090dd", "#0077b5", "#005f8f"];
      return (
        <div style={cardStyle}>
          <SectionTitle>เส้นทางดำเนินงาน (Funnel)</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {FUNNEL.map((f, i) => (
              <div key={i}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                  <span style={{ fontSize: 11, color: "#64748b" }}>{f.step}</span>
                  <span style={{ fontSize: 11, color: "#334155", fontWeight: 600 }}>
                    {fmtN(f.value)} คัน
                  </span>
                </div>
                <div style={{ background: "#f1f5f9", borderRadius: 8, height: 30, overflow: "hidden", position: "relative" }}>
                  <div
                    style={{
                      width: `${(f.value / max) * 100}%`, height: "100%",
                      background: colors[i], borderRadius: 8,
                      display: "flex", alignItems: "center", paddingLeft: 10,
                    }}
                  >
                    <span style={{ color: "white", fontSize: 10, fontWeight: 700 }}>{f.pct}%</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 18, paddingTop: 14, borderTop: "1px solid #f1f5f9", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[
              { label: "จ่ายจริง (71.1%)", val: "314.7 ลบ.", c: { bg: "#f0fdf4", text: "#16a34a", sub: "#4ade80" } },
              { label: "ค้างจ่าย (28.9%)", val: "128.2 ลบ.", c: { bg: "#fef2f2", text: "#dc2626", sub: "#f87171" } },
            ].map((item) => (
              <div key={item.label} style={{ background: item.c.bg, borderRadius: 12, padding: "12px", textAlign: "center" }}>
                <div style={{ fontSize: 17, fontWeight: 700, color: item.c.text }}>{item.val}</div>
                <div style={{ fontSize: 10, color: item.c.sub, marginTop: 2 }}>{item.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const GroupSummary = () => {
      const groups = useMemo(() =>
        Object.entries(GRP).map(([key, cfg]) => {
          const provs = PROVINCES.filter((p) => p.group === key);
          const pending = provs.reduce((s, p) => s + p.pending, 0);
          const units = provs.reduce((s, p) => s + p.units, 0);
          return { key, ...cfg, pending, units };
        }), []);
      const total = groups.reduce((s, g) => s + g.pending, 0);

      return (
        <div style={cardStyle}>
          <SectionTitle>สรุปกลุ่มปัญหา — เงินค้างจ่าย</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {groups.map((g) => (
              <div key={g.key} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div
                  style={{
                    width: 28, height: 28, borderRadius: 8, background: g.color,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "white", fontSize: 11, fontWeight: 800, flexShrink: 0,
                  }}
                >
                  {g.key}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 11, fontWeight: 600, color: "#374151", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {g.label}
                    </span>
                    <span style={{ fontSize: 11, color: "#475569", fontWeight: 600, marginLeft: 8, flexShrink: 0 }}>
                      {g.count} จว.
                    </span>
                  </div>
                  <div style={{ background: "#f1f5f9", borderRadius: 4, height: 6 }}>
                    <div style={{ width: `${(g.pending / total) * 100}%`, height: "100%", background: g.color, borderRadius: 4 }} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 3 }}>
                    <span style={{ fontSize: 10, color: "#64748b", fontWeight: 500 }}>{fmtM(g.pending)}</span>
                    <span style={{ fontSize: 10, color: "#94a3b8" }}>{((g.pending / total) * 100).toFixed(0)}% ของยอดค้างรวม</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const Top10Chart = () => {
      const top10 = useMemo(() =>
        [...PROVINCES].sort((a, b) => b.pending - a.pending).slice(0, 10), []);

      return (
        <div style={cardStyle}>
          <SectionTitle>Top 10 เงินค้างจ่าย (ลบ.)</SectionTitle>
          <ResponsiveContainer width="100%" height={230}>
            <BarChart data={top10} layout="vertical" margin={{ top: 0, right: 44, bottom: 0, left: 0 }}>
              <XAxis type="number" tickFormatter={(v) => `${(v / 1e6).toFixed(0)}`} tick={{ fontSize: 9, fill: "#9ca3af" }} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" width={82} tick={{ fontSize: 9.5, fill: "#374151" }} axisLine={false} tickLine={false} />
              <Tooltip
                formatter={(v) => [fmtM(v), "ค้างจ่าย"]}
                contentStyle={{ borderRadius: 8, fontSize: 11, border: "1px solid #e2e8f0", boxShadow: "0 2px 8px rgba(0,0,0,0.08)" }}
              />
              <Bar dataKey="pending" radius={[0, 4, 4, 0]} maxBarSize={16}>
                {top10.map((p) => (
                  <Cell key={p.code} fill={GRP[p.group]?.color || PRIMARY} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    };

    const ProvinceTable = ({ data }) => {
      const [sort, setSort] = useState({ field: "rank", dir: "asc" });
      const [hovered, setHovered] = useState(null);

      const handleSort = (field) => {
        setSort((s) => ({ field, dir: s.field === field && s.dir === "asc" ? "desc" : "asc" }));
      };

      const sorted = useMemo(() => {
        return [...data].sort((a, b) => {
          const mul = sort.dir === "asc" ? 1 : -1;
          if (sort.field === "name") return a.name.localeCompare(b.name, "th") * mul;
          return ((a[sort.field] || 0) - (b[sort.field] || 0)) * mul;
        });
      }, [data, sort]);

      const SH = ({ field, label, align = "right" }) => {
        const active = sort.field === field;
        return (
          <th
            onClick={() => handleSort(field)}
            style={{
              padding: "11px 12px", textAlign: align, fontSize: 11, fontWeight: 600,
              color: active ? PRIMARY : "#64748b", whiteSpace: "nowrap", cursor: "pointer", userSelect: "none",
              background: "transparent",
            }}
          >
            <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
              {label}
              {active
                ? sort.dir === "asc" ? <ChevronUp size={11} style={{ color: PRIMARY }} /> : <ChevronDown size={11} style={{ color: PRIMARY }} />
                : <ChevronDown size={10} style={{ color: "#d1d5db" }} />}
            </span>
          </th>
        );
      };

      return (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 720 }}>
            <thead>
              <tr style={{ background: "#fafafa", borderBottom: "1px solid #f1f5f9" }}>
                <SH field="rank" label="#" align="left" />
                <th style={{ padding: "11px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b" }}>จังหวัด</th>
                <SH field="reg"      label="ลงทะเบียน" />
                <SH field="eligible" label="ได้สิทธิ์" />
                <SH field="inRound"  label="เข้ารอบ" />
                <SH field="paid"     label="จ่ายแล้ว" />
                <SH field="pending"  label="ค้างจ่าย" />
                <th style={{ padding: "11px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b" }}>%จ่าย</th>
                <SH field="score"    label="คะแนน" />
              </tr>
            </thead>
            <tbody>
              {sorted.map((p) => {
                const isHov = hovered === p.code;
                const scoreColor = p.score > 30 ? "#dc2626" : p.score > 10 ? "#ea580c" : p.score > 5 ? "#d97706" : "#94a3b8";
                const barColor = p.pct >= 90 ? "#22c55e" : p.pct >= 50 ? PRIMARY : "#ef4444";
                return (
                  <tr
                    key={p.code}
                    onMouseEnter={() => setHovered(p.code)}
                    onMouseLeave={() => setHovered(null)}
                    style={{
                      borderBottom: "1px solid #f8fafc",
                      background: isHov ? "#f8fbff" : "white",
                      transition: "background 0.12s",
                    }}
                  >
                    <td style={{ padding: "13px 12px", fontSize: 11, color: "#94a3b8", fontWeight: 600 }}>{p.rank}</td>
                    <td style={{ padding: "13px 12px" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 4 }}>{p.name}</div>
                        <GroupBadge g={p.group} />
                      </div>
                    </td>
                    <td style={{ padding: "13px 12px", textAlign: "right", fontSize: 12, color: "#475569" }}>{fmtN(p.reg)}</td>
                    <td style={{ padding: "13px 12px", textAlign: "right", fontSize: 12, color: "#475569" }}>{fmtN(p.eligible)}</td>
                    <td style={{ padding: "13px 12px", textAlign: "right", fontSize: 12, color: "#475569" }}>{fmtN(p.inRound)}</td>
                    <td style={{ padding: "13px 12px", textAlign: "right", fontSize: 12, color: "#16a34a", fontWeight: 500 }}>
                      {p.paid > 0 ? fmtM(p.paid) : <span style={{ color: "#d1d5db" }}>—</span>}
                    </td>
                    <td style={{ padding: "13px 12px", textAlign: "right" }}>
                      {p.pending > 0 ? (
                        <span style={{ fontSize: 12, fontWeight: 700, color: p.pending > 5e6 ? "#dc2626" : p.pending > 1e6 ? "#ea580c" : "#64748b" }}>
                          {fmtM(p.pending)}
                        </span>
                      ) : (
                        <span style={{ color: "#22c55e", fontWeight: 700, fontSize: 13 }}>✓</span>
                      )}
                    </td>
                    <td style={{ padding: "13px 12px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <div style={{ width: 48, height: 5, background: "#f1f5f9", borderRadius: 3, flexShrink: 0 }}>
                          <div style={{ width: `${Math.min(p.pct, 100)}%`, height: "100%", background: barColor, borderRadius: 3 }} />
                        </div>
                        <span style={{ fontSize: 11, fontWeight: 700, color: "#374151", minWidth: 34 }}>
                          {p.pct.toFixed(0)}%
                        </span>
                      </div>
                    </td>
                    <td style={{ padding: "13px 12px", textAlign: "right" }}>
                      <span
                        style={{
                          fontSize: 12, fontWeight: 800, color: scoreColor,
                          background: `${scoreColor}12`, padding: "2px 7px", borderRadius: 6,
                        }}
                      >
                        {p.score.toFixed(1)}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    };

    const cardStyle = {
      background: "white", borderRadius: 16, padding: 24,
      boxShadow: "0 1px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)",
      border: "1px solid #f1f5f9",
    };
    const SectionTitle = ({ children }) => (
      <h3 style={{ fontSize: 13, fontWeight: 700, color: "#374151", margin: "0 0 18px" }}>{children}</h3>
    );

    /* ═══════════════════════════════════════════════════════════
       MAIN DASHBOARD
    ═══════════════════════════════════════════════════════════ */
    function App() {
      const [activeGroup, setActiveGroup] = useState("ALL");
      const [search, setSearch]           = useState("");

      const filtered = useMemo(() =>
        PROVINCES.filter((p) => {
          const matchG = activeGroup === "ALL" || p.group === activeGroup;
          const matchS = !search || p.name.includes(search);
          return matchG && matchS;
        }), [activeGroup, search]);

      const TOTALS = { reg: 230374, eligible: 113134, inRound: 102386, paid: 314655729, pending: 128161234 };

      const filterTabs = [
        { key: "ALL", label: "ทั้งหมด (77)" },
        ...Object.entries(GRP).map(([k, v]) => ({ key: k, label: `${k} · ${v.short} (${v.count})` })),
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#eef2f7", fontFamily: '"Sarabun", "Noto Sans Thai", system-ui, sans-serif' }}>
          <div style={{ background: "white", borderBottom: "1px solid #e8eef4", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
            <div style={{ maxWidth: 1280, margin: "0 auto", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 38, height: 38, borderRadius: 11, background: `linear-gradient(135deg, ${PRIMARY} 0%, #0079ff 100%)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Car size={19} color="white" />
                </div>
                <div>
                  <h1 style={{ fontSize: 16, fontWeight: 800, color: "#0f172a", margin: 0, letterSpacing: "-0.3px" }}>
                    GPS Subsidy Dashboard
                  </h1>
                  <p style={{ fontSize: 11, color: "#94a3b8", margin: "2px 0 0" }}>
                    โครงการเบิกจ่ายเงินช่วยเหลือ ระบบ GPS · 77 จังหวัดทั่วประเทศ
                  </p>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#94a3b8" }}>ข้อมูล ณ</div>
                <div
                  style={{
                    fontSize: 12, fontWeight: 700, color: "white",
                    background: PRIMARY, padding: "2px 10px", borderRadius: 20, marginTop: 2,
                  }}
                >
                  10 ก.ค. 2569
                </div>
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 1280, margin: "0 auto", padding: "24px 24px 32px", display: "flex", flexDirection: "column", gap: 20 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 14 }}>
              <KPICard title="รถลงทะเบียน"   value={fmtN(TOTALS.reg)}      sub="77 จังหวัดทั่วประเทศ"        color={PRIMARY}     icon={Car}          />
              <KPICard title="ได้รับสิทธิ์ GPS" value={fmtN(TOTALS.eligible)} sub="49.1% ของรถลงทะเบียน"        color="#6366f1"     icon={CheckCircle}  />
              <KPICard title="เข้ารอบจ่ายเงิน" value={fmtN(TOTALS.inRound)}  sub="90.5% ของผู้ได้สิทธิ์"       color="#0ea5e9"     icon={BarChart2}    />
              <KPICard title="จ่ายจริง"        value={fmtM(TOTALS.paid)}     sub="71.1% ของยอดเข้ารอบ"        color="#22c55e"     icon={Wallet}       />
              <KPICard title="เงินค้างจ่าย"   value={fmtM(TOTALS.pending)}  sub="รอเบิกจ่ายอีก 28.9%"        color="#ef4444"     icon={AlertTriangle} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16 }}>
              <FunnelViz />
              <GroupSummary />
              <Top10Chart />
            </div>

            <div style={{ background: "white", borderRadius: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", border: "1px solid #f1f5f9", overflow: "hidden" }}>
              <div style={{ padding: "20px 24px", borderBottom: "1px solid #f1f5f9" }}>
                <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 14 }}>
                  <h2 style={{ fontSize: 15, fontWeight: 700, color: "#0f172a", margin: 0 }}>
                    รายละเอียดรายจังหวัด
                    <span style={{ fontSize: 13, fontWeight: 400, color: "#94a3b8", marginLeft: 8 }}>
                      ({filtered.length} จังหวัด)
                    </span>
                  </h2>
                  <div style={{ position: "relative" }}>
                    <Search size={12} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#94a3b8" }} />
                    <input
                      type="text"
                      placeholder="ค้นหาจังหวัด..."
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                      style={{
                        paddingLeft: 30, paddingRight: 14, paddingTop: 8, paddingBottom: 8,
                        fontSize: 12, border: "1px solid #e2e8f0", borderRadius: 10,
                        outline: "none", background: "#f8fafc", width: 175, color: "#374151",
                      }}
                    />
                  </div>
                </div>

                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {filterTabs.map(({ key, label }) => {
                    const isActive = activeGroup === key;
                    const gc = key !== "ALL" ? GRP[key] : null;
                    return (
                      <button
                        key={key}
                        onClick={() => setActiveGroup(key)}
                        style={{
                          padding: "6px 13px", borderRadius: 10, fontSize: 11, fontWeight: 700,
                          border: "none", cursor: "pointer", transition: "all 0.15s",
                          background: isActive ? (key === "ALL" ? PRIMARY : gc.color) : "#f1f5f9",
                          color: isActive ? "white" : "#64748b",
                          boxShadow: isActive ? `0 2px 8px ${key === "ALL" ? PRIMARY : gc?.color}40` : "none",
                        }}
                      >
                        {label}
                      </button>
                    );
                  })}
                </div>
              </div>

              {filtered.length > 0 ? (
                <ProvinceTable data={filtered} />
              ) : (
                <div style={{ padding: "64px 24px", textAlign: "center", color: "#94a3b8" }}>
                  <MapPin size={32} style={{ margin: "0 auto 12px", display: "block", opacity: 0.3 }} />
                  <p style={{ fontSize: 13, margin: 0 }}>ไม่พบจังหวัดที่ค้นหา</p>
                  <button
                    onClick={() => { setSearch(""); setActiveGroup("ALL"); }}
                    style={{ marginTop: 12, fontSize: 11, color: PRIMARY, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}
                  >
                    ล้างตัวกรอง
                  </button>
                </div>
              )}
            </div>

            <div style={{ textAlign: "center", fontSize: 11, color: "#94a3b8", paddingBottom: 8 }}>
              แหล่งข้อมูล: ฐานข้อมูล dlt_subsidy (Prod) · ข้อมูล ณ 10 ก.ค. 2569 เวลา 16:14 น.
              · กลุ่มนโยบายและแผน (กผง.) กรมการขนส่งทางบก (ขบ.)
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
